<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning — Cabinet Dr Beclin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1b1e;
      color: #f8f9fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ─────────────────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1.5rem;
      background: #222325;
      border-bottom: 1px solid #2d2f33;
      flex-wrap: wrap;
    }
    .btn-back {
      background: none;
      border: 1.5px solid #3a3d44;
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      color: #9ca3af;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-back:hover { border-color: #6b92e4; color: #f8f9fb; }
    .topbar h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em; }
    .topbar-spacer { flex: 1; }
    .btn-refresh {
      background: none;
      border: 1.5px solid #3a3d44;
      border-radius: 8px;
      padding: 0.4rem 0.85rem;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      color: #9ca3af;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-refresh:hover:not(:disabled) { border-color: #6b92e4; color: #f8f9fb; }
    .btn-refresh:disabled { opacity: 0.4; cursor: default; }

    /* ── Loading banner ──────────────────────────────────────────────────── */
    #loading-banner {
      display: none;
      align-items: center;
      gap: 0.75rem;
      padding: 0.55rem 1.5rem;
      background: #2d2f33;
      border-bottom: 1px solid #3a3d44;
      font-size: 0.83rem;
      color: #9ca3af;
    }
    #loading-banner.visible { display: flex; }
    .progress-bar-wrap {
      flex: 1; max-width: 220px; height: 4px;
      background: #3a3d44; border-radius: 2px; overflow: hidden;
    }
    .progress-bar-fill { height: 100%; background: #6b92e4; transition: width 0.3s; }

    /* ── Navigation ──────────────────────────────────────────────────────── */
    .nav-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      background: #222325;
      border-bottom: 1px solid #2d2f33;
    }
    .btn-nav {
      background: none;
      border: 1.5px solid #3a3d44;
      border-radius: 8px;
      padding: 0.3rem 0.7rem;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: inherit;
      color: #9ca3af;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-nav:hover { border-color: #6b92e4; color: #f8f9fb; }
    .btn-nav.disabled { opacity: 0.25; pointer-events: none; }
    .day-title { font-size: 1rem; font-weight: 600; }
    .day-jt { font-size: 0.8rem; color: #9ca3af; margin-left: 0.25rem; }
    .badge {
      display: inline-block; font-size: 0.7rem; font-weight: 700;
      padding: 0.12rem 0.45rem; border-radius: 999px;
      background: #2d4a24; color: #7fcf6a;
    }
    .badge.closed     { background: #3a2424; color: #d97070; }
    .badge.conditional { background: #3a3420; color: #d4b860; }

    /* ── Legend ──────────────────────────────────────────────────────────── */
    .legend {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 0.55rem 1.5rem 0.55rem calc(1.5rem + 90px + 32px);
      background: #1a1b1e;
      border-bottom: 1px solid #222325;
      font-size: 0.75rem;
      color: #6b7280;
    }
    .legend-item { display: flex; align-items: center; gap: 0.35rem; }
    .legend-swatch {
      width: 14px; height: 10px; border-radius: 3px;
    }
    .legend-swatch--jt   { background: #6b92e4; opacity: 0.9; }
    .legend-swatch--real { background: #4caf7d; opacity: 0.85; }
    .legend-swatch--miss { background: rgba(220, 60, 60, 0.75); }
    .legend-swatch--extra { background: rgba(230, 140, 30, 0.75); }

    /* ── Main content ────────────────────────────────────────────────────── */
    .content { flex: 1; padding: 1.25rem 1.5rem; overflow: auto; }

    .empty-state {
      text-align: center; color: #6b7280; margin-top: 4rem; font-size: 0.95rem;
    }

    /* ── Gantt chart ─────────────────────────────────────────────────────── */
    .gantt-wrap { overflow-x: auto; }
    .gantt      { min-width: 820px; display: flex; flex-direction: column; gap: 0; }

    /* Time header */
    .gantt-header {
      display: flex;
      margin-left: calc(90px + 32px);   /* label + sub-label columns */
      position: relative;
      height: 22px;
      margin-bottom: 8px;
    }
    .gantt-tick {
      position: absolute;
      transform: translateX(-50%);
      font-size: 0.68rem;
      color: #6b7280;
      white-space: nowrap;
    }

    /* One fauteuil = label + 3 rows */
    .gantt-group {
      display: flex;
      align-items: stretch;
      margin-bottom: 10px;
    }
    .gantt-group-label {
      width: 90px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 0.6rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: #9ca3af;
    }
    .gantt-group-rows {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* Each row = sub-label + timeline */
    .gantt-row {
      display: flex;
      align-items: stretch;
    }
    .gantt-sub-label {
      width: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 5px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #4b5263;
      text-transform: uppercase;
    }
    .gantt-timeline {
      flex: 1;
      position: relative;
      border-radius: 5px;
      overflow: hidden;
    }

    /* Row heights */
    .gantt-row--jt   .gantt-timeline { height: 44px; background: #1e2023; }
    .gantt-row--real .gantt-timeline { height: 44px; background: #1c2120; }
    .gantt-row--diff .gantt-timeline { height: 14px; background: transparent; }

    /* Hour grid lines */
    .gantt-grid-line {
      position: absolute; top: 0; bottom: 0; width: 1px; background: #2d2f33;
    }

    /* ── Event blocks ────────────────────────────────────────────────────── */
    .gantt-event {
      position: absolute;
      top: 4px; bottom: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.66rem;
      font-weight: 700;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      padding: 0 4px;
      cursor: default;
      border: 1px solid rgba(0,0,0,0.25);
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.55);
      transition: filter 0.15s;
    }
    .gantt-event:hover { filter: brightness(1.18); z-index: 10; }

    /* Real appointments: slightly outlined */
    .gantt-event--real {
      border: 1.5px solid rgba(255,255,255,0.3);
      filter: brightness(0.85) saturate(0.7);
    }
    .gantt-event--real:hover { filter: brightness(1.05) saturate(0.9); }

    /* Diff row blocks */
    .gantt-event--diff {
      top: 1px; bottom: 1px;
      border-radius: 3px;
      border: none;
      font-size: 0;     /* no text */
    }
    .gantt-event--diff-missing { background: rgba(220, 55, 55, 0.75); }
    .gantt-event--diff-extra   { background: rgba(230, 140, 30, 0.75); }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <a href="{% url 'intra_landing' %}" class="btn-back">← Intranet</a>
    <h1>Planning</h1>
    <span class="topbar-spacer"></span>
    <button class="btn-refresh" id="btn-refresh">Actualiser</button>
  </div>

  <!-- Loading banner -->
  <div id="loading-banner">
    <span id="loading-text">Chargement…</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <span id="loading-percent">0 %</span>
  </div>

  <!-- Day navigation -->
  <div class="nav-bar">
    <a id="btn-prev" href="#" class="btn-nav{% if not prev_date %} disabled{% endif %}">&#8592;</a>
    <span class="day-title" id="day-label">—</span>
    <span class="day-jt" id="day-jt-name"></span>
    <span class="badge" id="day-badge"></span>
    <span style="flex:1"></span>
    <a id="btn-next" href="#" class="btn-nav{% if not next_date %} disabled{% endif %}">&#8594;</a>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch legend-swatch--jt"></div> Journée type
    </div>
    <div class="legend-item">
      <div class="legend-swatch legend-swatch--real"></div> Rendez-vous réels
    </div>
    <div class="legend-item">
      <div class="legend-swatch legend-swatch--miss"></div> Manquant
    </div>
    <div class="legend-item">
      <div class="legend-swatch legend-swatch--extra"></div> Hors planning
    </div>
  </div>

  <!-- Chart -->
  <div class="content">
    <div id="empty-state" class="empty-state" style="display:none">
      Aucun planning disponible pour ce jour.
    </div>
    <div class="gantt-wrap" id="gantt-wrap">
      <div class="gantt" id="gantt"></div>
    </div>
  </div>

  <script>
    // ── Data from Django ────────────────────────────────────────────────────
    const INITIAL_DATA = {{ day_data_json|safe }};
    let selectedDate   = "{{ selected_date }}";
    let prevDate       = {{ prev_date_json|safe }};
    let nextDate       = {{ next_date_json|safe }};

    const DATA_URL    = "{% url 'planning_data' %}";
    const REFRESH_URL = "{% url 'planning_refresh' %}";
    const STATUS_URL  = "{% url 'planning_loading_status' %}";
    const CSRF_TOKEN  = "{{ csrf_token }}";

    // ── Loading state ───────────────────────────────────────────────────────
    let pollTimer = null;

    function showBanner(text, percent) {
      document.getElementById("loading-banner").classList.add("visible");
      document.getElementById("loading-text").textContent = text || "Chargement…";
      document.getElementById("loading-percent").textContent = percent + " %";
      document.getElementById("progress-fill").style.width = percent + "%";
      document.getElementById("btn-refresh").disabled = true;
    }
    function hideBanner() {
      document.getElementById("loading-banner").classList.remove("visible");
      document.getElementById("btn-refresh").disabled = false;
    }
    function startPolling() {
      if (pollTimer) return;
      pollTimer = setInterval(async () => {
        const res  = await fetch(STATUS_URL);
        const data = await res.json();
        if (data.loading) {
          showBanner(data.text, data.percent);
        } else {
          clearInterval(pollTimer);
          pollTimer = null;
          hideBanner();
          await loadDay(selectedDate);
        }
      }, 1200);
    }

    // ── Helpers ─────────────────────────────────────────────────────────────
    function toHHMM(m) {
      return String(Math.floor(m / 60)).padStart(2, "0") + "h"
           + String(m % 60).padStart(2, "0");
    }

    function makeTimeline() {
      const tl = document.createElement("div");
      tl.className = "gantt-timeline";
      return tl;
    }

    function addGridLines(timeline, dispStart, dispEnd, dispSpan) {
      for (let t = dispStart; t <= dispEnd; t += 60) {
        const line = document.createElement("div");
        line.className = "gantt-grid-line";
        line.style.left = ((t - dispStart) / dispSpan * 100) + "%";
        timeline.appendChild(line);
      }
    }

    function makeEventBlock(leftPct, widthPct, color, text, title, extraClass) {
      const el = document.createElement("div");
      el.className = "gantt-event" + (extraClass ? " " + extraClass : "");
      el.style.left       = leftPct  + "%";
      el.style.width      = widthPct + "%";
      el.style.background = color;
      el.textContent      = text;
      if (title) el.title = title;
      return el;
    }

    // ── Gantt renderer ──────────────────────────────────────────────────────
    function renderGantt(data) {
      const gantt    = document.getElementById("gantt");
      const emptyDiv = document.getElementById("empty-state");
      gantt.innerHTML = "";

      const hasEvents = data && data.events && data.events.length > 0;
      const hasAppts  = data && data.appointments && data.appointments.length > 0;

      if (!hasEvents && !hasAppts) {
        emptyDiv.style.display = "block";
        document.getElementById("gantt-wrap").style.display = "none";
        return;
      }
      emptyDiv.style.display = "none";
      document.getElementById("gantt-wrap").style.display = "";

      const startT = data.start_time;
      const endT   = data.end_time;
      const dispStart = Math.floor(startT / 60) * 60;
      const dispEnd   = Math.ceil(endT   / 60) * 60;
      const dispSpan  = (dispEnd - dispStart) || 1;

      // ── Time header ───────────────────────────────────────────────────────
      const header = document.createElement("div");
      header.className = "gantt-header";
      for (let t = dispStart; t <= dispEnd; t += 60) {
        const tick = document.createElement("div");
        tick.className = "gantt-tick";
        tick.style.left = ((t - dispStart) / dispSpan * 100) + "%";
        tick.textContent = toHHMM(t);
        header.appendChild(tick);
      }
      gantt.appendChild(header);

      // ── Group events/appointments/diffs by fauteuil ───────────────────────
      const eventsByF = {};
      const apptsByF  = {};
      const diffsByF  = {};

      for (const evt  of (data.events       || [])) (eventsByF[evt.fauteuil]  = eventsByF[evt.fauteuil]  || []).push(evt);
      for (const appt of (data.appointments || [])) {
        const f = appt.fauteuil ?? "__unassigned__";
        (apptsByF[f] = apptsByF[f] || []).push(appt);
      }
      for (const d of (data.diffs || [])) (diffsByF[d.fauteuil]  = diffsByF[d.fauteuil]  || []).push(d);

      // ── Fauteuil rows ─────────────────────────────────────────────────────
      for (const fauteuil of (data.fauteils || [])) {
        const group = document.createElement("div");
        group.className = "gantt-group";

        // Label (spans all 3 rows)
        const lbl = document.createElement("div");
        lbl.className   = "gantt-group-label";
        lbl.textContent = "Fauteuil " + (parseInt(fauteuil) + 1);
        group.appendChild(lbl);

        const rows = document.createElement("div");
        rows.className = "gantt-group-rows";

        // ── Row 1 : JT events ─────────────────────────────────────────────
        const rowJT = document.createElement("div");
        rowJT.className = "gantt-row gantt-row--jt";

        const subJT = document.createElement("div");
        subJT.className = "gantt-sub-label";
        subJT.textContent = "JT";
        rowJT.appendChild(subJT);

        const tlJT = makeTimeline();
        addGridLines(tlJT, dispStart, dispEnd, dispSpan);

        for (const evt of (eventsByF[fauteuil] || [])) {
          const lp = (evt.startminutes - dispStart) / dispSpan * 100;
          const wp = evt.duration                   / dispSpan * 100;
          const title = [
            evt.value,
            toHHMM(evt.startminutes) + " – " + toHHMM(evt.startminutes + evt.duration),
            evt.duration + " min",
            evt.as1 ? "Asst début " + evt.as1 + " min" : "",
            evt.as2 ? "Asst fin "   + evt.as2 + " min" : "",
            evt.dr  ? "Dr "         + evt.dr  + " min" : "",
          ].filter(Boolean).join("\n");
          tlJT.appendChild(makeEventBlock(lp, wp, evt.color, evt.value, title, ""));
        }
        rowJT.appendChild(tlJT);
        rows.appendChild(rowJT);

        // ── Row 2 : Real appointments ─────────────────────────────────────
        const rowReal = document.createElement("div");
        rowReal.className = "gantt-row gantt-row--real";

        const subReal = document.createElement("div");
        subReal.className = "gantt-sub-label";
        subReal.textContent = "Réel";
        rowReal.appendChild(subReal);

        const tlReal = makeTimeline();
        addGridLines(tlReal, dispStart, dispEnd, dispSpan);

        for (const appt of (apptsByF[fauteuil] || [])) {
          const lp = (appt.startminutes - dispStart) / dispSpan * 100;
          const wp = (appt.duration || 25)           / dispSpan * 100;
          const title = [
            appt.plage_planning,
            toHHMM(appt.startminutes) + " – " + toHHMM(appt.startminutes + (appt.duration || 25)),
            appt.patient_name,
            appt.praticien_name ? "Dr " + appt.praticien_name : "",
          ].filter(Boolean).join("\n");
          const label = appt.patient_name.split(" ")[0] || appt.plage_planning;
          tlReal.appendChild(makeEventBlock(lp, wp, appt.color, label, title, "gantt-event--real"));
        }
        rowReal.appendChild(tlReal);
        rows.appendChild(rowReal);

        // ── Row 3 : Diff ──────────────────────────────────────────────────
        const rowDiff = document.createElement("div");
        rowDiff.className = "gantt-row gantt-row--diff";

        const subDiff = document.createElement("div");
        subDiff.className = "gantt-sub-label";
        subDiff.textContent = "±";
        rowDiff.appendChild(subDiff);

        const tlDiff = makeTimeline();

        for (const d of (diffsByF[fauteuil] || [])) {
          const lp = (d.startminutes - dispStart) / dispSpan * 100;
          const wp = d.duration                   / dispSpan * 100;
          const cls = d.type === "missing" ? "gantt-event--diff gantt-event--diff-missing"
                                           : "gantt-event--diff gantt-event--diff-extra";
          const tip = d.type === "missing" ? "Manquant : " + toHHMM(d.startminutes)
                                           : "Hors planning : " + toHHMM(d.startminutes);
          tlDiff.appendChild(makeEventBlock(lp, wp, "", "", tip, cls));
        }
        rowDiff.appendChild(tlDiff);
        rows.appendChild(rowDiff);

        group.appendChild(rows);
        gantt.appendChild(group);
      }

      // ── Unassigned appointments (no fauteuil match) ───────────────────────
      const unassigned = apptsByF["__unassigned__"];
      if (unassigned && unassigned.length > 0) {
        const group = document.createElement("div");
        group.className = "gantt-group";
        const lbl = document.createElement("div");
        lbl.className   = "gantt-group-label";
        lbl.textContent = "Non assigné";
        lbl.style.color = "#6b7280";
        lbl.style.fontSize = "0.72rem";
        group.appendChild(lbl);

        const rows = document.createElement("div");
        rows.className = "gantt-group-rows";
        const rowReal = document.createElement("div");
        rowReal.className = "gantt-row gantt-row--real";
        const subReal = document.createElement("div");
        subReal.className = "gantt-sub-label";
        subReal.textContent = "Réel";
        rowReal.appendChild(subReal);
        const tlReal = makeTimeline();
        addGridLines(tlReal, dispStart, dispEnd, dispSpan);
        for (const appt of unassigned) {
          const lp = (appt.startminutes - dispStart) / dispSpan * 100;
          const wp = (appt.duration || 25)           / dispSpan * 100;
          const title = [appt.plage_planning, toHHMM(appt.startminutes), appt.patient_name].filter(Boolean).join("\n");
          const label = appt.patient_name.split(" ")[0] || appt.plage_planning;
          tlReal.appendChild(makeEventBlock(lp, wp, appt.color, label, title, "gantt-event--real"));
        }
        rowReal.appendChild(tlReal);
        rows.appendChild(rowReal);
        group.appendChild(rows);
        gantt.appendChild(group);
      }
    }

    // ── Navigation helpers ──────────────────────────────────────────────────
    function badgeClass(status) {
      if (status === "Ouvert") return "badge";
      if (status && status.startsWith("En fonction")) return "badge conditional";
      return "badge closed";
    }

    function updateNavBar(data) {
      document.getElementById("day-label").textContent   = data ? data.label  : selectedDate;
      document.getElementById("day-jt-name").textContent = data && data.jt_name ? "— " + data.jt_name : "";
      const badge = document.getElementById("day-badge");
      badge.textContent = data ? data.status : "";
      badge.className   = data ? badgeClass(data.status) : "badge";
    }

    function updateNavButtons() {
      const prev = document.getElementById("btn-prev");
      const next = document.getElementById("btn-next");
      prev.href = prevDate ? "?date=" + prevDate : "#";
      prev.classList.toggle("disabled", !prevDate);
      next.href = nextDate ? "?date=" + nextDate : "#";
      next.classList.toggle("disabled", !nextDate);
    }

    // ── Load a day via API ──────────────────────────────────────────────────
    async function loadDay(dateStr) {
      const res = await fetch(DATA_URL + "?date=" + dateStr);
      if (!res.ok) return;
      const json = await res.json();
      selectedDate = dateStr;
      prevDate     = json.prev_date;
      nextDate     = json.next_date;
      updateNavBar(json.day);
      updateNavButtons();
      renderGantt(json.day);
      history.replaceState(null, "", "?date=" + dateStr);
    }

    // ── Navigation clicks ───────────────────────────────────────────────────
    document.getElementById("btn-prev").addEventListener("click", async (e) => {
      if (!prevDate) return;
      e.preventDefault();
      await loadDay(prevDate);
    });
    document.getElementById("btn-next").addEventListener("click", async (e) => {
      if (!nextDate) return;
      e.preventDefault();
      await loadDay(nextDate);
    });

    // ── Refresh button ──────────────────────────────────────────────────────
    document.getElementById("btn-refresh").addEventListener("click", async () => {
      const res = await fetch(REFRESH_URL, {
        method: "POST",
        headers: { "X-CSRFToken": CSRF_TOKEN },
      });
      if (res.ok) startPolling();
    });

    // ── Keyboard navigation ─────────────────────────────────────────────────
    document.addEventListener("keydown", async (e) => {
      if (e.key === "ArrowLeft"  && prevDate) { e.preventDefault(); await loadDay(prevDate); }
      if (e.key === "ArrowRight" && nextDate) { e.preventDefault(); await loadDay(nextDate); }
    });

    // ── Init ────────────────────────────────────────────────────────────────
    (function init() {
      updateNavBar(INITIAL_DATA);
      updateNavButtons();
      renderGantt(INITIAL_DATA);
      {% if is_loading %}
      showBanner("{{ loading_text }}", {{ loading_percent }});
      startPolling();
      {% endif %}
    })();
  </script>
</body>
</html>
